<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 技术文档知识库</title>
  <!-- 主题CSS：先尝试jsdelivr，失败用unpkg -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css"
        onerror="this.href='https://unpkg.com/docsify-themeable@0/dist/css/theme-simple-dark.css'">
  <style>
    :root {
      --theme-color: #7CB342;
      --sidebar-width: 280px;
    }
    .sidebar-nav > ul > li > p { font-weight: 700; font-size: 14px; }
    /* 加载动画 */
    .loading-wrap { display: flex; justify-content: center; align-items: center; height: 60vh; flex-direction: column; }
    .loading-spinner { width: 40px; height: 40px; border: 4px solid #3a3a3a; border-top-color: #7CB342; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <p style="color:#7CB342; margin-top:16px;">文档加载中...</p>
    </div>
  </div>
  <script>
    window.$docsify = {
      name: '📚 技术文档知识库',
      nameLink: '#/',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      auto2top: true,
      notFoundPage: true,
      search: {
        paths: 'auto',
        placeholder: '搜索文档',
        noData: '没有找到结果',
        depth: 6
      },
      pagination: {
        previousText: '上一章节',
        nextText: '下一章节',
        crossChapter: true,
        crossChapterText: true,
      }
    }
  </script>
  <!-- docsify核心：jsdelivr + unpkg双回退 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"
          onerror="var s=document.createElement('script');s.src='https://unpkg.com/docsify@4/lib/docsify.min.js';document.body.appendChild(s)"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"
          onerror="var s=document.createElement('script');s.src='https://unpkg.com/docsify@4/lib/plugins/search.min.js';document.body.appendChild(s)"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"
          onerror="var s=document.createElement('script');s.src='https://unpkg.com/docsify@4/lib/plugins/emoji.min.js';document.body.appendChild(s)"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"
          onerror="var s=document.createElement('script');s.src='https://unpkg.com/docsify-pagination@2/dist/docsify-pagination.min.js';document.body.appendChild(s)"></script>
</body>
</html>
