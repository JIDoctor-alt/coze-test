<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术知识库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 50px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        }
        .card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .card p {
            color: #666;
            line-height: 1.6;
        }
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 技术知识库</h1>
        <div class="card-grid">
            <div class="card" onclick="window.open('https://github.com/JIDoctor-alt/coze-test/tree/master/技术知识库', '_blank')">
                <h2>🎨 技术知识库</h2>
                <p>Java/K8s/Transformer/微调/AI工程化/AI应用/提示词工程/面试宝典 八大技术教程，含519张蜡笔小新风格插画海报 + 对话版文档</p>
                <span class="badge">519张插画 · 8篇教程</span>
            </div>
            <div class="card" onclick="window.open('https://github.com/JIDoctor-alt/coze-test/tree/master/企业知识库平台', '_blank')">
                <h2>🏢 企业知识库平台</h2>
                <p>企业级知识库系统完整设计文档，涵盖需求分析、系统设计、数据库设计、接口文档等全流程</p>
                <span class="badge">250MB文档</span>
            </div>
            <div class="card" onclick="window.open('https://github.com/JIDoctor-alt/coze-test/tree/master/技术知识库/PICC源码解析', '_blank')">
                <h2>🏥 PICC项目源码解析</h2>
                <p>PICC慢病管理系统全套源码解析，5524个文件逐文件拆解，小白友好版纯代码解析</p>
                <span class="badge">63篇文档 · 5个服务</span>
            </div>
        </div>
    </div>
</body>
</html>
