<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 技术文档知识库</title>
  <style>
    :root { --theme-color: #7CB342; --sidebar-width: 280px; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; color: #c9d1d9; background: #0d1117; }
    .loading-wrap { display: flex; justify-content: center; align-items: center; height: 60vh; flex-direction: column; }
    .loading-spinner { width: 40px; height: 40px; border: 4px solid #3a3a3a; border-top-color: #7CB342; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Docsify fallback: 如果Docsify没加载，显示基本样式 */
    .fallback-nav { max-width: 800px; margin: 40px auto; padding: 20px; }
    .fallback-nav h1 { color: #7CB342; }
    .fallback-nav a { color: #58a6ff; text-decoration: none; }
    .fallback-nav a:hover { text-decoration: underline; }
    .fallback-nav ul { line-height: 2; }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <p style="color:#7CB342; margin-top:16px;">文档加载中...</p>
      <p style="color:#666; margin-top:8px; font-size:12px;">如长时间未加载，请检查网络或尝试刷新</p>
    </div>
  </div>
  <script>
    window.$docsify = {
      name: '📚 技术文档知识库',
      nameLink: '#/',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      auto2top: true,
      notFoundPage: true,
      search: {
        paths: 'auto',
        placeholder: '搜索文档',
        noData: '没有找到结果',
        depth: 6
      }
    }
  </script>
  <!-- 多CDN回退：jsdelivr -> unpkg -> cdnjs -->
  <script>
    function loadScript(urls, callback) {
      var i = 0;
      function tryNext() {
        if (i >= urls.length) { if (callback) callback(); return; }
        var s = document.createElement('script');
        s.src = urls[i];
        s.onload = function() { if (callback) callback(); };
        s.onerror = function() { i++; tryNext(); };
        document.body.appendChild(s);
      }
      tryNext();
    }
    // 加载docsify核心
    loadScript([
      'https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js',
      'https://unpkg.com/docsify@4/lib/docsify.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/docsify/4.13.1/docsify.min.js'
    ], function() {
      // docsify加载完后加载插件
      loadScript(['https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js',
        'https://unpkg.com/docsify@4/lib/plugins/search.min.js']);
      loadScript(['https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js',
        'https://unpkg.com/docsify@4/lib/plugins/emoji.min.js']);
    });
  </script>
</body>
</html>
